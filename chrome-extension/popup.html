<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Whisk Token Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
      color: #ffffff;
    }

    .header {
      background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
      padding: 16px 20px;
      border-bottom: 2px solid #00ff88;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #000000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .subtitle {
      font-size: 11px;
      color: #00000088;
      margin-top: 4px;
      font-weight: 400;
    }

    .content {
      padding: 20px;
    }

    .status-card {
      background: #252525;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #333;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-indicator.active {
      background: #00ff88;
      box-shadow: 0 0 12px #00ff8888;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-indicator.inactive {
      background: #ff4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .status-time {
      font-size: 12px;
      color: #888;
    }

    .token-display {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #00ff88;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 8px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .info-item {
      background: #252525;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #333;
    }

    .info-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 600;
      color: #00ff88;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
      color: #000000;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px #00ff8844;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      padding: 16px 20px;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #666;
      text-align: center;
    }

    .footer a {
      color: #00ff88;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <span>🔑</span>
      <span>Whisk Token Manager</span>
    </h1>
    <div class="subtitle">Professional OAuth automation</div>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-header">
        <div class="status-indicator" id="indicator"></div>
        <div class="status-text" id="status-text">Initializing...</div>
        <div class="status-time" id="status-time">-</div>
      </div>
      <div class="token-display" id="token-preview">No token captured yet</div>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Status</div>
        <div class="info-value" id="connection-status">●</div>
      </div>
      <div class="info-item">
        <div class="info-label">Auto-Refresh</div>
        <div class="info-value">ENABLED</div>
      </div>
    </div>

    <button class="btn btn-primary" id="refresh-btn">
      Refresh Token Now
    </button>
  </div>

  <div class="footer">
    Obsidian News Desk • <a href="http://localhost:8347" target="_blank">Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
