<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Whisk Token Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 450px;
      min-height: 500px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #e0e0e0;
      padding: 20px;
      overflow-y: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #444;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00ff88;
      margin-bottom: 8px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-indicator.active {
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
    }

    .status-indicator.inactive {
      background: #ff4444;
      box-shadow: 0 0 8px #ff4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #3a3a3a;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 600;
      color: #00ff88;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #3a3a3a;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 13px;
      color: #999;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
    }

    .token-display {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      word-break: break-all;
      color: #00ff88;
      max-height: 100px;
      overflow-y: auto;
    }

    .token-display.masked {
      color: #666;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #00ff88;
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      background: #00dd77;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #3a3a3a;
      color: #e0e0e0;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #4a4a4a;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .copy-btn {
      padding: 6px 12px;
      background: #3a3a3a;
      color: #e0e0e0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #4a4a4a;
    }

    .copy-btn.copied {
      background: #00ff88;
      color: #000;
    }

    .error-log {
      max-height: 120px;
      overflow-y: auto;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px;
    }

    .error-log-empty {
      text-align: center;
      color: #666;
      padding: 8px;
      font-size: 12px;
    }

    .error-item {
      background: #2a2a2a;
      border-left: 3px solid #ff4444;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 4px;
    }

    .error-time {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }

    .error-message {
      font-size: 12px;
      color: #ff8888;
    }

    .footer {
      text-align: center;
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid #444;
      font-size: 11px;
      color: #666;
    }

    .footer a {
      color: #00ff88;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    #version-info {
      margin-bottom: 8px;
    }

    .debug-info {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎨 Whisk Token Manager</h1>
    <div>
      <span class="status-indicator" id="indicator"></span>
      <span id="status-text">Initializing...</span>
    </div>
  </div>

  <div class="card">
    <h2>Token Status</h2>
    <div class="info-row">
      <span class="info-label">Last Update:</span>
      <span class="info-value" id="status-time">Never</span>
    </div>
    <div class="info-row">
      <span class="info-label">Backend:</span>
      <span class="info-value" id="backend-status">Unknown</span>
    </div>
    <div class="info-row">
      <span class="info-label">Auto-Refresh:</span>
      <span class="info-value" id="refresh-status">Checking...</span>
    </div>

    <div class="token-display masked" id="token-display">
      Loading...
    </div>

    <div class="btn-group">
      <button class="copy-btn" id="copy-btn">Copy</button>
      <button class="copy-btn" id="toggle-mask">Show/Hide</button>
    </div>
  </div>

  <div class="card">
    <h2>Actions</h2>
    <div class="btn-group">
      <button class="btn btn-primary" id="refresh-btn">
        🔄 Refresh Now
      </button>
      <button class="btn btn-secondary" id="test-backend">
        🔗 Test Backend
      </button>
    </div>

    <button class="btn btn-secondary" id="open-dashboard" style="width: 100%; margin-top: 12px;">
      📊 Open Dashboard
    </button>
  </div>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <h2 style="margin-bottom: 0;">Error Log</h2>
      <button class="copy-btn" id="clear-errors">Clear</button>
    </div>
    <div class="error-log" id="error-log">
      <div class="error-log-empty">Loading...</div>
    </div>
  </div>

  <!-- Debug Info -->
  <div class="debug-info" id="debug-info">
    Extension: Loading...<br>
    Background: Checking...<br>
    Permissions: Checking...
  </div>

  <div class="footer">
    <div id="version-info">v1.1.0 • Production Ready</div>
    <div style="margin-top: 4px;">
      <a href="http://localhost:8347" target="_blank" id="dashboard-link">Dashboard</a> •
      <a href="#" id="show-background">View Background Console</a>
    </div>
  </div>

  <script src="popup-enhanced-fixed.js"></script>
</body>
</html>
