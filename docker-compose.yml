version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: obsidian-postgres
    environment:
      POSTGRES_DB: obsidian_news
      POSTGRES_USER: obsidian
      POSTGRES_PASSWORD: obsidian_password
    ports:
      - "7891:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/lib/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsidian"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obsidian-redis
    command: redis-server --requirepass obsidian_redis_password --appendonly yes
    ports:
      - "7892:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
