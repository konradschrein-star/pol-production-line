<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian News Desk - Installation Wizard</title>
  <link rel="stylesheet" href="../styles/wizard.css">
  <!-- Compiled Tailwind CSS for React components (offline support) -->
  <link rel="stylesheet" href="../../dist/installer/wizard-styles.css">
</head>
<body>
  <div class="wizard-container">
    <!-- Header -->
    <div class="wizard-header">
      <h1>Obsidian News Desk</h1>
      <p>Automated News Video Production Pipeline</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <!-- Content Area -->
    <div class="wizard-content">

      <!-- Page 1: Welcome -->
      <div class="wizard-page active" id="page-welcome">
        <div id="welcome-root"></div>
      </div>

      <!-- Page 2: Docker Check -->
      <div class="wizard-page" id="page-docker">
        <div id="docker-root"></div>
      </div>

      <!-- Page 3: Storage Path -->
      <div class="wizard-page" id="page-storage">
        <div id="storage-root"></div>
      </div>

      <!-- Page 4: API Configuration (React) -->
      <div class="wizard-page" id="page-api-config">
        <div id="api-root"></div>
      </div>

      <!-- Page 5: Database Services (React) -->
      <div class="wizard-page" id="page-database">
        <div id="database-root"></div>
      </div>

      <!-- Page 6: Installation Progress (React) -->
      <div class="wizard-page" id="page-install">
        <div id="install-root"></div>
      </div>

      <!-- Page 7: Complete (React) -->
      <div class="wizard-page" id="page-complete">
        <div id="complete-root"></div>
      </div>

    </div>

    <!-- Footer -->
    <div class="wizard-footer">
      <div>
        <button id="btn-prev" class="btn btn-outline" style="display: none;">
          ← Back
        </button>
      </div>
      <div class="btn-group">
        <button id="btn-next" class="btn btn-primary">
          Next →
        </button>
        <button id="btn-finish" class="btn btn-success" style="display: none;">
          Launch Application
        </button>
      </div>
    </div>
  </div>

  <!-- Load React bundle first -->
  <script src="../../dist/installer/wizard-react.js"></script>

  <!-- Load wizard logic -->
  <script src="../wizard.js"></script>
</body>
</html>
