appId: com.obsidiannewsdesk.app
productName: Obsidian News Desk
copyright: Copyright © 2026 Obsidian News Desk

# Directories
directories:
  output: dist
  buildResources: electron/build

# Files to include
files:
  - .next/**/*
  - electron/dist/**/*
  - node_modules/**/*
  - package.json
  - docker-compose.yml
  - scripts/**/*
  - src/**/*
  - public/**/*
  - next.config.js
  - tsconfig.json
  - tailwind.config.ts
  - postcss.config.js
  - .env.example
  - "!node_modules/@remotion"
  - "!.git"
  - "!.github"
  - "!.vscode"
  - "!**/*.md"
  - "!**/*.log"
  - "!.env"

# Extra resources (bundled Node.js, Chrome extension, scripts)
extraResources:
  # Portable Node.js runtime
  - from: "resources/node"
    to: "node"
    filter:
      - "**/*"

  # FFmpeg binaries for video rendering
  - from: "resources/bin"
    to: "bin"
    filter:
      - "**/*"

  # Scripts and utilities
  - from: "scripts/optimize-avatar.sh"
    to: "scripts/optimize-avatar.sh"

  # Chrome extension for Whisk token auto-refresh
  - from: "chrome-extension"
    to: "chrome-extension"
    filter:
      - "**/*"
      - "!**/node_modules/**"

  # Portable launcher script
  - from: "launcher.bat"
    to: "launcher.bat"

# Extend info plist
extraMetadata:
  main: electron/dist/main.js

# Windows-specific configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
  publisherName: Obsidian News Desk
  verifyUpdateCodeSignature: false
  signAndEditExecutable: false
  signDlls: false

  # CODE SIGNING (Optional - Phase 6)
  # Uncomment and configure when certificate is obtained
  # See docs/CODE_SIGNING.md for setup guide
  # certificateFile: certs/code-signing.pfx
  # certificatePassword: ${env:CSC_KEY_PASSWORD}
  # signingHashAlgorithms:
  #   - sha256
  # rfc3161TimeStampServer: http://timestamp.digicert.com

  # Keep signing disabled for now
  sign: null
  signingHashAlgorithms: null

# NSIS installer configuration
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ${productName}
  installerIcon: electron/build/icon.ico
  uninstallerIcon: electron/build/icon.ico
  # installerHeader: electron/build/installerHeader.bmp  # Optional - not included
  installerHeaderIcon: electron/build/icon.ico
  license: LICENSE
  warningsAsErrors: false
  displayLanguageSelector: false
  installerLanguages:
    - en_US
  menuCategory: false

# Compression
compression: normal

# Publish configuration (for auto-updates)
publish:
  - provider: github
    owner: konradschrein-star
    repo: pol-production-line
    releaseType: release
    private: false
