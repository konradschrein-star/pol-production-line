appId: com.obsidiannewsdesk.app
productName: Obsidian News Desk
copyright: Copyright © 2026 Obsidian News Desk

# Directories
directories:
  output: dist
  buildResources: electron/build

# Files to include
files:
  - .next/**/*
  - electron/dist/**/*
  - node_modules/**/*
  - package.json
  - docker-compose.yml
  - scripts/**/*
  - src/**/*
  - public/**/*
  - next.config.js
  - tsconfig.json
  - tailwind.config.ts
  - postcss.config.js
  - .env.example
  - "!node_modules/@remotion"
  - "!.git"
  - "!.github"
  - "!.vscode"
  - "!**/*.md"
  - "!**/*.log"
  - "!.env"

# Extra resources (bundled Node.js, Chrome extension, scripts)
extraResources:
  # Portable Node.js runtime
  - from: "resources/node"
    to: "node"
    filter:
      - "**/*"

  # Scripts and utilities
  - from: "scripts/optimize-avatar.sh"
    to: "scripts/optimize-avatar.sh"

  # Chrome extension
  - from: "chrome-extension"
    to: "chrome-extension"
    filter:
      - "**/*"
      - "!**/node_modules/**"
  - from: "CHROME_EXTENSION_SETUP.md"
    to: "CHROME_EXTENSION_SETUP.md"

  # Portable launcher script
  - from: "launcher.bat"
    to: "launcher.bat"

# Extend info plist
extraMetadata:
  main: electron/dist/main.js

# Windows-specific configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
  publisherName: Obsidian News Desk
  verifyUpdateCodeSignature: false
  sign: null
  signingHashAlgorithms: null

# NSIS installer configuration
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ${productName}
  installerIcon: electron/build/icon.ico
  uninstallerIcon: electron/build/icon.ico
  installerHeader: electron/build/installerHeader.bmp
  installerHeaderIcon: electron/build/icon.ico
  license: LICENSE
  warningsAsErrors: false
  displayLanguageSelector: false
  installerLanguages:
    - en_US
  menuCategory: false

# Compression
compression: normal

# App metadata
artifactName: ${name}-${version}-${os}-${arch}.${ext}

# Publish configuration (for auto-updates)
publish:
  - provider: github
    owner: konradschrein-star
    repo: pol-production-line
    releaseType: release
    private: false
