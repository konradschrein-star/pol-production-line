version: '3.8'

# ================================
# Production Docker Compose
# Obsidian News Desk Automation Pipeline
# ================================
#
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in all required values
#   2. Ensure ports 5432, 6379, and 8347 are available
#   3. For production, use external database/redis or persistent volumes
#
# Services:
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 queue backend
#   - app: Next.js application with workers
#
# Networks:
#   - obsidian-net: Internal bridge network for service communication
#
# Volumes:
#   - postgres_data: Database storage (persistent)
#   - redis_data: Redis AOF storage (persistent)
#   - app_storage: Application file storage (images, videos, avatars)
#   - app_cache: Remotion bundle cache (can be ephemeral)

services:
  # --------------------------------
  # PostgreSQL Database
  # --------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: obsidian-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-obsidian_news}
      POSTGRES_USER: ${POSTGRES_USER:-obsidian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-obsidian_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/lib/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - obsidian-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obsidian} -d ${POSTGRES_DB:-obsidian_news}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------
  # Redis Queue Backend
  # --------------------------------
  redis:
    image: redis:7-alpine
    container_name: obsidian-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-obsidian_redis_password}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - obsidian-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-obsidian_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------
  # Next.js Application
  # --------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: obsidian-app-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8347}:8347"
    environment:
      # Application
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8347}
      PORT: 8347

      # Database (internal Docker network)
      DATABASE_URL: postgresql://${POSTGRES_USER:-obsidian}:${POSTGRES_PASSWORD:-obsidian_password}@postgres:5432/${POSTGRES_DB:-obsidian_news}

      # Redis (internal Docker network)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-obsidian_redis_password}

      # AI Providers
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}

      # Browser Automation
      AUTO_WHISK_EXTENSION_ID: ${AUTO_WHISK_EXTENSION_ID}
      DEFAULT_BROWSER: ${DEFAULT_BROWSER:-chrome}
      PLAYWRIGHT_USER_DATA_DIR: /app/playwright-data

      # HeyGen Configuration
      HEYGEN_AUDIO_SAMPLE_RATE: ${HEYGEN_AUDIO_SAMPLE_RATE:-48000}
      AVATAR_MODE: ${AVATAR_MODE:-manual}
      HEYGEN_PROFILE_PATH: ${HEYGEN_PROFILE_PATH:-./heygen-chrome-profile}
      PYTHON_EXECUTABLE: ${PYTHON_EXECUTABLE:-python3}

      # Google Whisk
      WHISK_API_TOKEN: ${WHISK_API_TOKEN}
      WHISK_IMAGE_MODEL: ${WHISK_IMAGE_MODEL:-IMAGEN_3_5}
      WHISK_CONCURRENCY: ${WHISK_CONCURRENCY:-2}
      WHISK_MIN_CONCURRENCY: ${WHISK_MIN_CONCURRENCY:-2}
      WHISK_MAX_CONCURRENCY: ${WHISK_MAX_CONCURRENCY:-5}

      # Remotion Rendering
      REMOTION_TIMEOUT_MS: ${REMOTION_TIMEOUT_MS:-300000}
      REMOTION_CONCURRENCY: ${REMOTION_CONCURRENCY:-4}
      REMOTION_BUNDLE_CACHE_DIR: /app/tmp/remotion-cache

    volumes:
      # Persistent storage for generated assets
      - app_storage:/app/storage
      # Cache for Remotion bundles (optional)
      - app_cache:/app/tmp/remotion-cache
      # Playwright browser profiles
      - ./playwright-data:/app/playwright-data
    networks:
      - obsidian-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8347/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------
  # BullMQ Workers (Optional - Run as separate service for scaling)
  # --------------------------------
  # Uncomment this service to run workers separately from the web app
  # workers:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: obsidian-workers-prod
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   command: ["node", "scripts/start-workers.js"]
  #   environment:
  #     # Same environment variables as app service
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-obsidian}:${POSTGRES_PASSWORD:-obsidian_password}@postgres:5432/${POSTGRES_DB:-obsidian_news}
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     REDIS_PASSWORD: ${REDIS_PASSWORD:-obsidian_redis_password}
  #     # ... add all other env vars from app service
  #   volumes:
  #     - app_storage:/app/storage
  #     - app_cache:/app/tmp/remotion-cache
  #   networks:
  #     - obsidian-net

networks:
  obsidian-net:
    driver: bridge
    name: obsidian-network

volumes:
  postgres_data:
    name: obsidian-postgres-data
  redis_data:
    name: obsidian-redis-data
  app_storage:
    name: obsidian-app-storage
  app_cache:
    name: obsidian-app-cache
